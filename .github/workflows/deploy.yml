# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                        CI/CD — Test & Deploy                               ║
# ║  Этот файл описывает автоматический пайплайн GitHub Actions.               ║
# ║  Он запускается при каждом push/PR и выполняет:                            ║
# ║  1. Проверку качества кода (ESLint + Prettier)                             ║
# ║  2. Запуск тестов (Jest)                                                   ║
# ║  3. Сборку и деплой на GitHub Pages                                        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# Название workflow — отображается во вкладке Actions на GitHub
name: CI/CD — Test & Deploy


# ══════════════════════════════════════════════════════════════════════════════
# ТРИГГЕРЫ — когда запускать этот workflow
# ══════════════════════════════════════════════════════════════════════════════
on:

  # Запускать при push (загрузке коммитов) в указанные ветки
  push:
    branches:
      - main   # основная боевая ветка
      - dev    # ветка разработки

  # Запускать при создании или обновлении Pull Request в ветку main
  # Это позволяет проверить код ДО того как он попадёт в main
  pull_request:
    branches:
      - main


# ══════════════════════════════════════════════════════════════════════════════
# ПРАВА ДОСТУПА — что этому workflow разрешено делать
# ══════════════════════════════════════════════════════════════════════════════
permissions:
  contents: read   # читать код репозитория
  pages: write     # записывать файлы на GitHub Pages (для деплоя)
  id-token: write  # получать токен авторизации (нужен для деплоя на Pages)


# ══════════════════════════════════════════════════════════════════════════════
# ПАРАЛЛЕЛЬНОСТЬ — защита от одновременных деплоев
# ══════════════════════════════════════════════════════════════════════════════
concurrency:
  # Все запуски с одинаковым group считаются конкурирующими
  # Используем 'pages' чтобы не было двух одновременных деплоев на GitHub Pages
  group: pages

  # false = не отменять предыдущий деплой если запустился новый
  # Текущий деплой доведём до конца, новый подождёт в очереди
  # (если поставить true — старый деплой будет отменяться в пользу нового)
  cancel-in-progress: false


# ══════════════════════════════════════════════════════════════════════════════
# JOBS — набор задач которые выполняются в пайплайне
# Каждый job запускается на отдельной виртуальной машине
# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Проверка качества кода
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    # Название job — отображается в интерфейсе Actions
    name: 🔍 Lint & Format

    # На каком типе виртуальной машины запускать
    # ubuntu-latest — последняя версия Ubuntu (бесплатно для публичных репо)
    runs-on: ubuntu-latest

    # Список шагов которые выполняются последовательно внутри job
    steps:

      # Скачать код репозитория на виртуальную машину
      # Без этого шага VM не будет знать о нашем коде
      - uses: actions/checkout@v4

      # Установить Node.js на виртуальную машину
      - uses: actions/setup-node@v4
        with:
          node-version: '20'  # версия Node.js
          cache: 'npm'        # кэшировать node_modules между запусками (ускоряет CI)

      # Установить зависимости из package-lock.json
      # npm ci — строже чем npm install, всегда ставит точные версии из lock файла
      # Это гарантирует одинаковое окружение на всех машинах
      - run: npm ci

      # Запустить ESLint — проверка качества и стиля кода
      # Если ESLint найдёт ошибки — job упадёт и следующие jobs не запустятся
      - run: npm run lint

      # Запустить Prettier в режиме проверки (без изменения файлов)
      # Если код не отформатирован — job упадёт
      # Разработчик должен запустить npm run format локально перед пушем
      - run: npm run format:check


  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Запуск тестов
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    # Этот job запустится ТОЛЬКО после успешного завершения job 'lint'
    # Если lint упал — тесты не запустятся (нет смысла тестировать плохой код)
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Запустить все тесты через Jest
      # Если хотя бы один тест упал — job упадёт и деплой не произойдёт
      - run: npm test


  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Деплой на DEV окружение
  # ────────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: 🚧 Deploy DEV
    runs-on: ubuntu-latest

    # Запускать ТОЛЬКО после успешных тестов
    needs: test

    # Условие запуска — только если это push в ветку dev
    # При push в main или при PR — этот job пропускается
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

    # Привязка к окружению 'dev' (создаётся в Settings → Environments)
    # Позволяет настраивать секреты и правила отдельно для dev
    environment:
      name: dev  # имя окружения в GitHub
      url: https://MaxKonopelko.github.io/react-ci-demo/dev/  # ссылка в интерфейсе

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Собрать проект в папку dist/
      - run: npm run build

      # Сохранить собранные файлы как артефакт
      # Артефакт можно скачать прямо из интерфейса Actions для проверки
      - name: Сохранить DEV сборку как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: dev-build      # имя архива в интерфейсе
          path: dist/          # что сохранять
          retention-days: 3    # хранить 3 дня затем удалить автоматически


  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4: Деплой на PROD окружение (GitHub Pages)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: 🚀 Deploy PROD
    runs-on: ubuntu-latest

    # Запускать ТОЛЬКО после успешных тестов
    needs: test

    # Условие запуска — только если это push в ветку main
    # При push в dev или при PR — этот job пропускается
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Привязка к окружению 'prod'
    # Если в Settings → Environments → prod включить "Required reviewers" —
    # деплой будет ждать ручного подтверждения перед запуском
    environment:
      name: prod
      # Динамическая ссылка — URL появится после первого деплоя
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Собрать проект (результат попадёт в папку dist/)
      - run: npm run build

      # Подготовить GitHub Pages к приёму файлов
      # Этот action настраивает окружение для деплоя
      - uses: actions/configure-pages@v5

      # Загрузить папку dist/ как артефакт для GitHub Pages
      # GitHub Pages сам возьмёт файлы из этого артефакта
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'  # папка с собранным проектом

      # Выполнить финальный деплой на GitHub Pages
      # id: deployment нужен чтобы получить URL сайта для отображения выше
      - id: deployment
        uses: actions/deploy-pages@v4